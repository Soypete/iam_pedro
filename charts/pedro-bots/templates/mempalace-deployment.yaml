{{- if .Values.mempalace.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pedro-bots.fullname" . }}-mempalace
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pedro-bots.labels" . | nindent 4 }}
    app.kubernetes.io/component: mempalace
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "pedro-bots.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mempalace
  template:
    metadata:
      labels:
        {{- include "pedro-bots.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mempalace
    spec:
      containers:
        - name: mempalace
          image: "{{ .Values.mempalace.image.repository }}:{{ .Values.mempalace.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 30
          env:
            - name: MEMPALACE_WRAPPER_ADDR
              value: ":8082"
            - name: MEMPALACE_DATA_DIR
              value: "/data/palaces"
          volumeMounts:
            - name: palace-data
              mountPath: /data/palaces
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      volumes:
        - name: palace-data
          persistentVolumeClaim:
            claimName: {{ include "pedro-bots.fullname" . }}-palaces
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "pedro-bots.fullname" . }}-palaces
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.mempalace.volume.storageSize | default "1Gi" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pedro-bots.fullname" . }}-mempalace
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pedro-bots.labels" . | nindent 4 }}
    app.kubernetes.io/component: mempalace
spec:
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      protocol: TCP
  selector:
    {{- include "pedro-bots.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mempalace
{{- end }}