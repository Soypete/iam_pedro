{{- if .Values.embeddings.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pedro-bots.fullname" . }}-embeddings
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pedro-bots.labels" . | nindent 4 }}
    app.kubernetes.io/component: embeddings
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "pedro-bots.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: embeddings
  template:
    metadata:
      labels:
        {{- include "pedro-bots.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: embeddings
    spec:
      containers:
        - name: embeddings
          image: "{{ .Values.embeddings.image.repository }}:{{ .Values.embeddings.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          command:
            - /bin/sh
            - -c
          args:
            - |
              curl -L -o /models/nomic-embed-text-v1.5-Q4_K_M.gguf "https://huggingface.co/nomic-ai/nomic-embed-text-v1.5-GGUF/resolve/main/nomic-embed-text-v1.5-Q4_K_M.gguf" || true
              exec llama-server -m {{ .Values.embeddings.modelPath }} --host 0.0.0.0 -p 8081 --embeddings --pooling mean -n 512
          {{- if .Values.embeddings.resources }}
          resources:
            {{- toYaml .Values.embeddings.resources | nindent 12 }}
          {{- end }}
      
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pedro-bots.fullname" . }}-embeddings
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pedro-bots.labels" . | nindent 4 }}
    app.kubernetes.io/component: embeddings
spec:
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    {{- include "pedro-bots.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: embeddings
{{- end }}