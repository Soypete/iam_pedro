fullnameOverride: "pedro"

replicaCount: 1

image:
  pullPolicy: Always

discordBot:
  enabled: true
  openbaoInjection: true
  image:
    repository: 100.81.89.62:5000/pedro-discord
    tag: df12033
  env:
    - name: MODEL
      value: "qwen3.6-27b"
    - name: LLAMA_CPP_PATH
      value: "http://100.121.229.114:8080"

twitchBot:
  enabled: true
  tailscaleIngress: true
  openbaoInjection: true
  image:
    repository: 100.81.89.62:5000/pedro-twitch
    tag: df12033
  env:
    - name: MODEL
      value: "qwen3.6-27b"
    - name: LLAMA_CPP_PATH
      value: "http://100.121.229.114:8080"
    - name: OAUTH_REDIRECT_HOST
      value: "chatbot-pedro-twitch-auth-ingress.tail6fbc5.ts.net"
    - name: MEMPALACE_WRAPPER_URL
      value: "http://pedro-mempalace:8082"
  volumes:
    - name: palace-data
      mountPath: /app/data/palaces
      readOnly: true
      claimName: pedro-palaces

mempalace:
  enabled: true
  image:
    repository: 100.81.89.62:5000/pedro-mempalace
    tag: latest
  volume:
    mountPath: /data/palaces
    storageSize: 1Gi

mempalace:
  enabled: true
  openbaoInjection: true
  image:
    repository: 100.81.89.62:5000/pedro-mempalace
    tag: dbca760

keepalive:
  enabled: true
  openbaoInjection: true
  image:
    repository: 100.81.89.62:5000/pedro-keepalive
    tag: df12033
  env:
    - name: DISCORD_BOT_URL
      value: "http://pedro-discord:6060/healthz"
    - name: TWITCH_BOT_URL
      value: "http://pedro-twitch:6060/healthz"
    - name: TWITCH_BOT_AUTH_URL
      value: "http://pedro-twitch:6060/healthz/auth"
    - name: LLAMA_CPP_PATH
      value: "http://100.121.229.114:8080"
    - name: CHECK_INTERVAL
      value: "60"
    - name: ALERT_INTERVAL
      value: "3600"

# Secrets populated by deploy.sh via 1Password CLI
secrets:
  twitchId: ""
  twitchSecret: ""
  postgresUrl: ""
  postgresVectorUrl: ""
  discordSecret: ""
  discordClientId: ""
  discordPublicKey: ""
  discordPermission: ""
  supabasePubKey: ""
  supabasePrivKey: ""
  supabaseUrl: ""
  supabaseJwt: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}